<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MUKESH ONLINE SERVICES</title>
<link rel="stylesheet" href="assets/css/login.css">
</head>

<body>

<div class="top-section">
    <div class="logo-area">
        <img src="assets/images/logo.png" class="logo">

        <h1>MUKESH <span>ONLINE SERVICES</span></h1>
        <p class="subtitle">Digital Portal</p>
        <p class="tagline">ALL INDIA SERVICES (24×7)</p>

        <p class="welcome">Welcome back, please login to your account.</p>
    </div>
</div>

<div class="login-box">

    <input type="text" id="username" placeholder="Username">

    <div class="password-box">
        <input type="password" id="password" placeholder="Password">
        <span class="eye" onclick="toggle()">👁</span>
    </div>

    <button class="login-btn" onclick="login()">Login</button>

    <div class="links">
        <a href="#">Forgot Password?</a>
        <a href="#">Create Account?</a>
    </div>
</div>

<footer>
    Copyright 2026 MUKESH ONLINE SERVICES
</footer>

<script src="assets/js/auth.js"></script>

</body>
</html>
